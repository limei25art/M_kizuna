<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>12恐龍捉迷藏 - MIRROR篇</title>
    <style>
        /* Apple Store UI 風格 */
        :root {
            --apple-blue: #007AFF;
            --apple-bg: #F2F2F7;
            --apple-text: #1C1C1E;
        }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { 
            margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #89CFF0; /* 預設背景色改為海洋藍 */
            overflow: hidden; 
            touch-action: none;
        }
        canvas { display: block; }
        
        /* UI 疊層 */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        
        /* 頂部狀態欄 */
        .hud {
            display: flex; justify-content: space-between; padding: 50px 20px 20px;
            pointer-events: auto;
        }
        .pill {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 30px;
            font-weight: 600; color: var(--apple-text);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            font-size: 16px;
        }

        /* 模態框 (Apple 底部彈出卡片風格) */
        .modal-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.4);
            display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            z-index: 100;
        }
        .modal-container.active {
            opacity: 1; pointer-events: auto;
        }
        .modal {
            background: white; width: 100%; max-width: 500px;
            border-radius: 30px 30px 0 0; padding: 40px 24px 50px;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.8, 0.2, 1);
            text-align: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
        }
        .modal-container.active .modal { transform: translateY(0); }
        
        .modal h2 { margin: 0 0 10px; font-size: 24px; color: var(--apple-text); }
        .modal p { color: #8E8E93; font-size: 16px; margin-bottom: 24px; line-height: 1.4; }
        
        .btn {
            background: var(--apple-blue); color: white; border: none;
            width: 100%; padding: 16px; border-radius: 14px;
            font-size: 17px; font-weight: 600; margin-bottom: 12px;
            cursor: pointer; transition: background 0.2s;
        }
        .btn:active { background: #005bb5; }
        .btn-outline { background: #F2F2F7; color: var(--apple-blue); }
        .btn-outline:active { background: #E5E5EA; }

        .center-modal { align-items: center; justify-content: center; }
        .center-modal .modal { border-radius: 24px; width: 85%; transform: scale(0.9); padding: 40px 24px; }
        .modal-container.active .center-modal .modal { transform: scale(1); }
        
        .emoji-art { font-size: 60px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="hud" id="hud" style="display:none;">
            <div class="pill" id="timerDisplay">⏱️ 00:00</div>
            <div class="pill" id="scoreDisplay">🦖 0 / 12</div>
        </div>
    </div>

    <div class="modal-container active center-modal" id="startScreen">
        <div class="modal">
            <div class="emoji-art">🌲💖🦖</div>
            <h2>12恐龍捉迷藏</h2>
            <p>MIRROR 特別版<br>在森林中尋找 12 隻隱藏的恐龍。<br>答對問題即可收服牠們！</p>
            <button class="btn" onclick="startGame()">開始遊戲</button>
        </div>
    </div>

    <div class="modal-container" id="questionScreen">
        <div class="modal">
            <div class="emoji-art">🦖❓</div>
            <h2 id="qTitle">發現野生恐龍！</h2>
            <p id="qText">問題載入中...</p>
            <div id="qOptions"></div>
        </div>
    </div>

    <div class="modal-container center-modal" id="endScreen">
        <div class="modal">
            <div class="emoji-art">🎉🏆🦖</div>
            <h2>任務完成！</h2>
            <p>你成功找齊了 12 隻 MIRROR 恐龍！<br>總耗時：<strong id="finalTime">00:00</strong></p>
            <button class="btn" onclick="location.reload()">再玩一次</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const WORLD_SIZE = 2000;
    let gameState = 'start'; 
    let startTime = 0;
    let timerInterval = null;
    let timeElapsed = 0;
    
    let camera = { x: WORLD_SIZE/2, y: WORLD_SIZE/2 };
    let input = { isDown: false, x: 0, y: 0 };

    const player = {
        x: WORLD_SIZE / 2, y: WORLD_SIZE / 2,
        speed: 4, size: 40, emoji: '💖',
        history: [], 
        caughtDinos: 0
    };
    
    const mirrorQuestions = [
        { q: "姜濤的粉絲名稱是什麼？", options: ["姜糖", "神徒", "爵屎"], ans: 0 },
        { q: "Anson Lo (盧瀚霆) 的專屬應援色是什麼？", options: ["粉紅色", "藍色", "綠色"], ans: 0 },
        { q: "Edan (呂爵安) 在《大叔的愛》中飾演什麼角色？", options: ["田一雄", "凌少牧", "翟國強"], ans: 0 },
        { q: "Ian (陳卓賢) 在入行前是哪一項運動的香港代表隊成員？", options: ["籃球", "排球", "足球"], ans: 1 },
        { q: "哪一首是 Jer (柳應廷) 的「物語系列」歌曲？", options: ["水刑物語", "狂人日記", "砂之器"], ans: 0 },
        { q: "AK 的全名是？", options: ["江𤒹生", "汪𤒹生", "江華生"], ans: 0 },
        { q: "Lokman (楊樂文) 在 MIRROR 中的職位是？", options: ["隊長", "副隊長", "忙內"], ans: 0 },
        { q: "Stanley (邱士縉) 有什麼稱號？", options: ["大表哥", "老虎仔", "皮皮"], ans: 0 },
        { q: "Frankie (陳瑞輝) 的別稱是什麼？", options: ["皮皮", "蛋白", "柳柳"], ans: 0 },
        { q: "Tiger (邱傲然) 最擅長的舞蹈/武術是？", options: ["拉丁舞", "芭蕾舞", "踢踏舞"], ans: 0 },
        { q: "Alton (王智德) 的經典金句是？", options: ["尋求無悔真生活", "焫焫焫焫焫著", "肌肉就是力量"], ans: 0 },
        { q: "Jeremy (李駿傑) 的粉絲名稱是？", options: ["Unicorn", "柳柳粉", "蛋白粉"], ans: 0 }
    ];

    // 生成邊界岩石 🪨
    const borders = [];
    const step = 50;
    for(let i = 0; i <= WORLD_SIZE; i += step) {
        borders.push({x: i, y: 0});               // 上
        borders.push({x: i, y: WORLD_SIZE});      // 下
        borders.push({x: 0, y: i});               // 左
        borders.push({x: WORLD_SIZE, y: i});      // 右
    }

    // 生成場景樹木 (確保不生在邊界外)
    const trees = [];
    for(let i=0; i<150; i++) {
        trees.push({
            x: Math.random() * (WORLD_SIZE - 100) + 50, 
            y: Math.random() * (WORLD_SIZE - 100) + 50,
            emoji: ['🌲','🌳','🌴'][Math.floor(Math.random()*3)],
            size: Math.random() * 20 + 40
        });
    }

    // 生成恐龍草叢
    const dinos = [];
    for(let i=0; i<12; i++) {
        dinos.push({
            x: Math.random() * (WORLD_SIZE - 200) + 100,
            y: Math.random() * (WORLD_SIZE - 200) + 100,
            question: mirrorQuestions[i],
            state: 'hidden', 
            bushEmoji: '🌟'
        });
    }

    let currentDinoIndex = -1;

    function handleInputStart(e) {
        if(gameState !== 'playing') return;
        input.isDown = true;
        updateInputPos(e);
    }
    function handleInputMove(e) {
        if(!input.isDown || gameState !== 'playing') return;
        updateInputPos(e);
    }
    function handleInputEnd() { input.isDown = false; }
    
    function updateInputPos(e) {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        input.x = clientX - canvas.width/2;
        input.y = clientY - canvas.height/2;
    }

    canvas.addEventListener('mousedown', handleInputStart);
    canvas.addEventListener('mousemove', handleInputMove);
    window.addEventListener('mouseup', handleInputEnd);
    canvas.addEventListener('touchstart', handleInputStart, {passive: false});
    canvas.addEventListener('touchmove', handleInputMove, {passive: false});
    window.addEventListener('touchend', handleInputEnd);

    window.startGame = function() {
        document.getElementById('startScreen').classList.remove('active');
        document.getElementById('hud').style.display = 'flex';
        gameState = 'playing';
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
        gameLoop();
    }

    function updateTimer() {
        if(gameState !== 'playing') return;
        timeElapsed = Math.floor((Date.now() - startTime) / 1000);
        const m = String(Math.floor(timeElapsed / 60)).padStart(2, '0');
        const s = String(timeElapsed % 60).padStart(2, '0');
        document.getElementById('timerDisplay').innerText = `⏱️ ${m}:${s}`;
    }

    function triggerQuestion(index) {
        gameState = 'question';
        input.isDown = false;
        currentDinoIndex = index;
        const dino = dinos[index];
        
        document.getElementById('qText').innerText = dino.question.q;
        const optsDiv = document.getElementById('qOptions');
        optsDiv.innerHTML = '';
        
        dino.question.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-outline';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            optsDiv.appendChild(btn);
        });
        
        document.getElementById('questionScreen').classList.add('active');
    }

    function checkAnswer(selectedIndex) {
        const dino = dinos[currentDinoIndex];
        if(selectedIndex === dino.question.ans) {
            document.getElementById('questionScreen').classList.remove('active');
            dino.state = 'caught';
            player.caughtDinos++;
            document.getElementById('scoreDisplay').innerText = `🦖 ${player.caughtDinos} / 12`;
            gameState = 'playing';
            
            if(player.caughtDinos >= 12) {
                endGame();
            }
        } else {
            const title = document.getElementById('qTitle');
            title.innerText = "答錯了！再試一次！";
            title.style.color = "#FF3B30";
            setTimeout(() => { title.innerText = "發現野生恐龍！"; title.style.color = "var(--apple-text)"; }, 1500);
        }
    }

    function endGame() {
        gameState = 'end';
        clearInterval(timerInterval);
        const m = String(Math.floor(timeElapsed / 60)).padStart(2, '0');
        const s = String(timeElapsed % 60).padStart(2, '0');
        document.getElementById('finalTime').innerText = `${m}:${s}`;
        document.getElementById('hud').style.display = 'none';
        setTimeout(() => { document.getElementById('endScreen').classList.add('active'); }, 500);
    }

    function gameLoop() {
        update();
        draw();
        if(gameState !== 'end') requestAnimationFrame(gameLoop);
    }

    function update() {
        if(gameState !== 'playing') return;

        // 角色移動與邊界碰撞 (保留 40 像素的緩衝區，避免踩穿石頭)
        if(input.isDown) {
            const dist = Math.hypot(input.x, input.y);
            if(dist > 5) {
                const dx = (input.x / dist) * player.speed;
                const dy = (input.y / dist) * player.speed;
                player.x = Math.max(40, Math.min(WORLD_SIZE - 40, player.x + dx));
                player.y = Math.max(40, Math.min(WORLD_SIZE - 40, player.y + dy));
            }
        }

        player.history.unshift({x: player.x, y: player.y});
        if(player.history.length > 300) player.history.pop();

        camera.x += (player.x - camera.x) * 0.1;
        camera.y += (player.y - camera.y) * 0.1;

        dinos.forEach((dino, index) => {
            if(dino.state === 'hidden') {
                const dist = Math.hypot(player.x - dino.x, player.y - dino.y);
                if(dist < 50) triggerQuestion(index);
            }
        });
    }

    function draw() {
        // 1. 畫螢幕底色：設定為海洋水色 (地圖外的世界)
        ctx.fillStyle = '#89CFF0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(canvas.width/2 - camera.x, canvas.height/2 - camera.y);

        // 2. 畫地圖底色：森林草地 (可玩區域)
        ctx.fillStyle = '#A8D5BA';
        ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // 3. 畫邊界岩石牆
        ctx.font = `40px Arial`;
        borders.forEach(b => {
            ctx.fillText('🪨', b.x, b.y);
        });

        // 4. 畫樹木
        trees.forEach(tree => {
            ctx.font = `${tree.size}px Arial`;
            ctx.fillText(tree.emoji, tree.x, tree.y);
        });

        // 5. 畫隱藏的恐龍(草叢)
        dinos.forEach(dino => {
            if(dino.state === 'hidden') {
                ctx.font = `50px Arial`;
                ctx.fillText(dino.bushEmoji, dino.x, dino.y);
            }
        });

        // 6. 畫跟隨的恐龍
        let caughtCount = 0;
        dinos.forEach(dino => {
            if(dino.state === 'caught') {
                caughtCount++;
                const historyIndex = caughtCount * 15; 
                const pos = player.history[historyIndex] || player.history[player.history.length-1];
                if(pos) {
                    ctx.font = `35px Arial`;
                    ctx.fillText('🦖', pos.x, pos.y);
                }
            }
        });

        // 7. 畫主角
        ctx.font = `${player.size}px Arial`;
        ctx.fillText(player.emoji, player.x, player.y);

        ctx.restore();
    }
</script>
</body>
</html>

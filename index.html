<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>12恐龍捉迷藏 - MIRROR篇 (高性能版)</title>
    <style>
        /* Apple Store UI 風格 */
        :root {
            --apple-blue: #007AFF;
            --apple-bg: #F2F2F7;
            --apple-text: #1C1C1E;
            --apple-orange: #FF9500;
        }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { 
            margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #89CFF0; /* 海洋藍 */
            overflow: hidden; 
            touch-action: none;
        }
        canvas { display: block; }
        
        /* UI 疊層 */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        
        /* 頂部狀態欄 */
        .hud {
            display: flex; justify-content: space-between; padding: 50px 20px 20px;
            pointer-events: auto;
            width: 100%;
        }
        .pill {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 30px;
            font-weight: 600; color: var(--apple-text);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            font-size: 16px;
            transition: all 0.3s;
        }
        .pill.highlight {
            background: rgba(255, 149, 0, 0.9);
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* 模態框 */
        .modal-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.4);
            display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            z-index: 100;
        }
        .modal-container.active {
            opacity: 1; pointer-events: auto;
        }
        .modal {
            background: white; width: 100%; max-width: 500px;
            border-radius: 30px 30px 0 0; padding: 40px 24px 50px;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.8, 0.2, 1);
            text-align: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
        }
        .modal-container.active .modal { transform: translateY(0); }
        
        .modal h2 { margin: 0 0 10px; font-size: 24px; color: var(--apple-text); }
        .modal p { color: #8E8E93; font-size: 16px; margin-bottom: 24px; line-height: 1.4; }
        
        .btn {
            background: var(--apple-blue); color: white; border: none;
            width: 100%; padding: 16px; border-radius: 14px;
            font-size: 17px; font-weight: 600; margin-bottom: 12px;
            cursor: pointer; transition: background 0.2s;
        }
        .btn:active { background: #005bb5; }
        .btn-outline { background: #F2F2F7; color: var(--apple-blue); }
        .btn-outline:active { background: #E5E5EA; }

        .center-modal { align-items: center; justify-content: center; }
        .center-modal .modal { border-radius: 24px; width: 85%; transform: scale(0.9); padding: 40px 24px; }
        .modal-container.active .center-modal .modal { transform: scale(1); }
        
        .emoji-art { font-size: 60px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="hud" id="hud" style="display:none;">
            <div class="pill" id="timerDisplay">⏱️ 00:00</div>
            <div class="pill" id="scoreDisplay">🦖 0 / 12</div>
        </div>
    </div>

    <div class="modal-container active center-modal" id="startScreen">
        <div class="modal">
            <div class="emoji-art">🌲🌼⛺</div>
            <h2>12恐龍捉迷藏</h2>
            <p>MIRROR 特別版 (高性能優化版)<br>在森林中尋找 12 隻隱藏的恐龍。<br>答對問題收服牠們，並帶回中央營地！</p>
            <button class="btn" onclick="startGame()">開始遊戲</button>
        </div>
    </div>

    <div class="modal-container" id="questionScreen">
        <div class="modal">
            <div class="emoji-art">🦖❓</div>
            <h2 id="qTitle">發現野生恐龍！</h2>
            <p id="qText">問題載入中...</p>
            <div id="qOptions"></div>
        </div>
    </div>

    <div class="modal-container center-modal" id="campHintScreen">
        <div class="modal">
            <div class="emoji-art">⛺🦖🔥</div>
            <h2>成功捉到12隻恐龍！</h2>
            <p>做得好！你已成功收服所有恐龍。<br>現在，請跟隨大隊回到地圖中央的 <strong>「中央營地 ⛺」</strong> 集合以結束遊戲！</p>
            <button class="btn" style="background:var(--apple-orange);" onclick="closeCampHint()">出發回營地！</button>
        </div>
    </div>

    <div class="modal-container center-modal" id="endScreen">
        <div class="modal">
            <div class="emoji-art">🎉🏆⛺</div>
            <h2>順利回到營地！</h2>
            <p>你成功將 12 隻 MIRROR 恐龍帶回大本營！<br>總耗時：<strong id="finalTime">00:00</strong></p>
            <button class="btn" onclick="location.reload()">再玩一次</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const WORLD_SIZE = 1300;
    
    // 遊戲狀態與基礎數據
    let gameState = 'start';
    let startTime = 0;
    let timerInterval = null;
    let timeElapsed = 0;
    
    let camera = { x: 200, y: 200 };
    let input = { isDown: false, x: 0, y: 0 };

    const player = {
        x: 200, y: 200,
        speed: 4.5, size: 40, emoji: '🌼',
        history: [{x: 200, y: 200}], 
        caughtDinos: 0
    };

    const camp = {
        x: WORLD_SIZE / 2,
        y: WORLD_SIZE / 2,
        size: 70
    };
    
    const mirrorQuestions = [
        { q: "姜濤的粉絲名稱是什麼？", options: ["姜糖", "神徒", "爵屎"], ans: 0 },
        { q: "Anson Lo (盧瀚霆) 的專屬應援色是什麼？", options: ["粉紅色", "藍色", "綠色"], ans: 0 },
        { q: "Edan (呂爵安) 在《大叔的愛》中飾演什麼角色？", options: ["田一雄", "凌少牧", "翟國強"], ans: 0 },
        { q: "Ian (陳卓賢) 在入行前是哪一項運動的香港代表隊成員？", options: ["籃球", "排球", "足球"], ans: 1 },
        { q: "哪一首是 Jer (柳應廷) 的「物語系列」歌曲？", options: ["水刑物語", "狂人日記", "砂之器"], ans: 0 },
        { q: "AK 的全名是？", options: ["江𤒹生", "汪𤒹生", "江華生"], ans: 0 },
        { q: "Lokman (楊樂文) 在 MIRROR 中的職位是？", options: ["隊長", "副隊長", "忙內"], ans: 0 },
        { q: "Stanley (邱士縉) 有什麼稱號？", options: ["大表哥", "老虎仔", "皮皮"], ans: 0 },
        { q: "Frankie (陳瑞輝) 的別稱是什麼？", options: ["皮皮", "蛋白", "柳柳"], ans: 0 },
        { q: "Tiger (邱傲然) 最擅長的舞蹈/武術是？", options: ["拉丁舞", "芭蕾舞", "踢踏舞"], ans: 0 },
        { q: "Alton (王智德) 的經典金句是？", options: ["尋求無悔真生活", "焫焫焫焫焫著", "肌肉就是力量"], ans: 0 },
        { q: "Jeremy (李駿傑) 的粉絲名稱是？", options: ["Unicorn", "柳柳粉", "蛋白粉"], ans: 0 }
    ];

    // 1. 先計算靜態數據 (邊界和樹木)
    const borders = [];
    const step = 50;
    for(let i = 0; i <= WORLD_SIZE; i += step) {
        borders.push({x: i, y: 0});
        borders.push({x: i, y: WORLD_SIZE});
        borders.push({x: 0, y: i});
        borders.push({x: WORLD_SIZE, y: i});
    }

    const trees = [];
    for(let i=0; i<65; i++) {
        let tx, ty;
        let attempts = 0;
        let valid = false;
        do {
            tx = Math.random() * (WORLD_SIZE - 100) + 50;
            ty = Math.random() * (WORLD_SIZE - 100) + 50;
            if (Math.hypot(tx - camp.x, ty - camp.y) < 180) continue;
            valid = true;
            for (let existing of trees) {
                if (Math.hypot(tx - existing.x, ty - existing.y) < 110) {
                    valid = false;
                    break;
                }
            }
            attempts++;
        } while (!valid && attempts < 80);
        
        if (valid) {
            trees.push({
                x: tx, y: ty,
                emoji: ['🌲','🌳','🌴'][Math.floor(Math.random()*3)],
                size: Math.random() * 20 + 40
            });
        }
    }

    // --- 【優化亮點】創建靜態大圖層離屏畫布 bgCanvas ---
    const bgCanvas = document.createElement('canvas');
    bgCanvas.width = WORLD_SIZE;
    bgCanvas.height = WORLD_SIZE;
    const bgCtx = bgCanvas.getContext('2d');

    // HEX 轉 RGBA (漸變專用)
    function hexToRgba(hex, a) {
        let r = parseInt(hex.slice(1, 3), 16);
        let g = parseInt(hex.slice(3, 5), 16);
        let b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${a})`;
    }

    // A. 繪製 Mesh Gradient 漸變底色
    bgCtx.fillStyle = '#04170c';
    bgCtx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);

    const gradientData = [
        {x: -0.104, y: 1.058, color: '#14532d'},
        {x: 0.329,  y: 1.072, color: '#577a1d'},
        {x: 0.697,  y: 1.093, color: '#052e16'},
        {x: 1.099,  y: 1.100, color: '#052e16'},
        {x: -0.073, y: 0.688, color: '#052e16'},
        {x: 0.318,  y: 0.680, color: '#678d28'},
        {x: 0.688,  y: 0.727, color: '#257128'},
        {x: 1.091,  y: 0.704, color: '#a3e635'},
        {x: -0.089, y: 0.312, color: '#16a34a'},
        {x: 0.309,  y: 0.306, color: '#14532d'},
        {x: 0.670,  y: 0.277, color: '#7ca041'},
        {x: 1.109,  y: 0.329, color: '#16a34a'},
        {x: -0.105, y: -0.106, color: '#16a34a'},
        {x: 0.322,  y: -0.096, color: '#a3e635'},
        {x: 0.696,  y: -0.087, color: '#16a34a'},
        {x: 1.093,  y: -0.073, color: '#4a6b14'}
    ];

    const maxRadius = WORLD_SIZE * 0.7; 
    gradientData.forEach(g => {
        const cx = g.x * WORLD_SIZE;
        const cy = g.y * WORLD_SIZE;
        const radGrad = bgCtx.createRadialGradient(cx, cy, 0, cx, cy, maxRadius);
        radGrad.addColorStop(0, hexToRgba(g.color, 1));
        radGrad.addColorStop(0.43, hexToRgba(g.color, 0));
        bgCtx.fillStyle = radGrad;
        bgCtx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);
    });

    // B. 一次性將「營地黃沙地」與「⛺」畫在底圖上
    bgCtx.fillStyle = '#E8D8BE';
    bgCtx.beginPath();
    bgCtx.arc(camp.x, camp.y, 75, 0, Math.PI * 2);
    bgCtx.fill();
    
    bgCtx.strokeStyle = '#D2B48C';
    bgCtx.lineWidth = 4;
    bgCtx.setLineDash([5, 10]);
    bgCtx.stroke();
    bgCtx.setLineDash([]);
    
    bgCtx.textAlign = 'center';
    bgCtx.textBaseline = 'middle';
    bgCtx.font = `${camp.size}px Arial`;
    bgCtx.fillText('⛺', camp.x, camp.y);

    // C. 將「邊界岩石 🪨」一次性合併繪製到 bgCanvas
    bgCtx.font = `40px Arial`;
    borders.forEach(b => {
        bgCtx.fillText('🪨', b.x, b.y);
    });

    // D. 將「所有樹木 🌲」一次性合併繪製到 bgCanvas
    trees.forEach(tree => {
        bgCtx.font = `${tree.size}px Arial`;
        bgCtx.fillText(tree.emoji, tree.x, tree.y);
    });
    // --- 離屏靜態圖層繪製完畢，這張大圖已被凍結在記憶體中！ ---


    // 生成動態隱藏恐龍
    const dinos = [];
    for(let i=0; i<12; i++) {
        let dx, dy;
        do {
            dx = Math.random() * (WORLD_SIZE - 200) + 100;
            dy = Math.random() * (WORLD_SIZE - 200) + 100;
        } while (Math.hypot(dx - camp.x, dy - camp.y) < 150);
        
        dinos.push({
            x: dx, y: dy,
            question: mirrorQuestions[i],
            state: 'hidden', 
            bushEmoji: '🌿'
        });
    }

    let currentDinoIndex = -1;

    // 觸控與滑鼠事件
    function handleInputStart(e) {
        if(gameState !== 'playing') return;
        input.isDown = true;
        updateInputPos(e);
    }
    function handleInputMove(e) {
        if(!input.isDown || gameState !== 'playing') return;
        updateInputPos(e);
    }
    function handleInputEnd() { input.isDown = false; }
    
    function updateInputPos(e) {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        input.x = clientX - canvas.width/2;
        input.y = clientY - canvas.height/2;
    }

    canvas.addEventListener('mousedown', handleInputStart);
    canvas.addEventListener('mousemove', handleInputMove);
    window.addEventListener('mouseup', handleInputEnd);
    canvas.addEventListener('touchstart', handleInputStart, {passive: false});
    canvas.addEventListener('touchmove', handleInputMove, {passive: false});
    window.addEventListener('touchend', handleInputEnd);

    window.startGame = function() {
        document.getElementById('startScreen').classList.remove('active');
        document.getElementById('hud').style.display = 'flex';
        gameState = 'playing';
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
        gameLoop();
    }

    function updateTimer() {
        if(gameState === 'start' || gameState === 'end') return;
        timeElapsed = Math.floor((Date.now() - startTime) / 1000);
        const m = String(Math.floor(timeElapsed / 60)).padStart(2, '0');
        const s = String(timeElapsed % 60).padStart(2, '0');
        document.getElementById('timerDisplay').innerText = `⏱️ ${m}:${s}`;
    }

    function triggerQuestion(index) {
        gameState = 'question';
        input.isDown = false;
        currentDinoIndex = index;
        const dino = dinos[index];
        
        document.getElementById('qText').innerText = dino.question.q;
        const optsDiv = document.getElementById('qOptions');
        optsDiv.innerHTML = '';
        
        dino.question.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-outline';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            optsDiv.appendChild(btn);
        });
        
        document.getElementById('questionScreen').classList.add('active');
    }

    function checkAnswer(selectedIndex) {
        const dino = dinos[currentDinoIndex];
        if(selectedIndex === dino.question.ans) {
            document.getElementById('questionScreen').classList.remove('active');
            dino.state = 'caught';
            player.caughtDinos++;
            
            if(player.caughtDinos < 12) {
                document.getElementById('scoreDisplay').innerText = `🦖 ${player.caughtDinos} / 12`;
                gameState = 'playing';
            } else {
                document.getElementById('scoreDisplay').innerText = `🦖 12 / 12 ✨`;
                triggerCampHint();
            }
        } else {
            const title = document.getElementById('qTitle');
            title.innerText = "答錯了！再試一次！";
            title.style.color = "#FF3B30";
            setTimeout(() => { title.innerText = "發現野生恐龍！"; title.style.color = "var(--apple-text)"; }, 1500);
        }
    }

    function triggerCampHint() {
        gameState = 'camp_hint';
        input.isDown = false;
        document.getElementById('campHintScreen').classList.add('active');
    }

    window.closeCampHint = function() {
        document.getElementById('campHintScreen').classList.remove('active');
        gameState = 'playing';
        
        const scoreDisp = document.getElementById('scoreDisplay');
        scoreDisp.innerText = `🧭 帶恐龍回營地 ⛺`;
        scoreDisp.classList.add('highlight');
    }

    function endGame() {
        gameState = 'end';
        clearInterval(timerInterval);
        const m = String(Math.floor(timeElapsed / 60)).padStart(2, '0');
        const s = String(timeElapsed % 60).padStart(2, '0');
        document.getElementById('finalTime').innerText = `${m}:${s}`;
        document.getElementById('hud').style.display = 'none';
        setTimeout(() => { document.getElementById('endScreen').classList.add('active'); }, 500);
    }

    function gameLoop() {
        update();
        draw();
        if(gameState !== 'end') requestAnimationFrame(gameLoop);
    }

    function update() {
        if(gameState !== 'playing') return;

        let isMoved = false; 

        if(input.isDown) {
            const dist = Math.hypot(input.x, input.y);
            if(dist > 5) {
                const dx = (input.x / dist) * player.speed;
                const dy = (input.y / dist) * player.speed;
                const nextX = Math.max(40, Math.min(WORLD_SIZE - 40, player.x + dx));
                const nextY = Math.max(40, Math.min(WORLD_SIZE - 40, player.y + dy));
                
                if (player.x !== nextX || player.y !== nextY) {
                    player.x = nextX;
                    player.y = nextY;
                    isMoved = true; 
                }
            }
        }

        if (isMoved) {
            player.history.unshift({x: player.x, y: player.y});
            // 【優化亮點】限制歷史軌跡的最大長度為當前恐龍尾巴所需長度 + 10，減少記憶體浪費
            const maxHistoryLength = (player.caughtDinos * 15) + 10;
            if(player.history.length > maxHistoryLength) player.history.pop();
        }

        camera.x += (player.x - camera.x) * 0.1;
        camera.y += (player.y - camera.y) * 0.1;

        if(player.caughtDinos < 12) {
            dinos.forEach((dino, index) => {
                if(dino.state === 'hidden') {
                    const dist = Math.hypot(player.x - dino.x, player.y - dino.y);
                    if(dist < 50) triggerQuestion(index);
                }
            });
        } else {
            const distToCamp = Math.hypot(player.x - camp.x, player.y - camp.y);
            if(distToCamp < 60) {
                endGame();
            }
        }
    }

    function draw() {
        // 1. 畫背景海藍色
        ctx.fillStyle = '#89CFF0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        // 【優化亮點】使用雙位元運算子 `~~` 對相機平移值取整，杜絕「亞像素抗鋸齒」帶來的 GPU 額外負擔與模糊感
        ctx.translate(~~(canvas.width/2 - camera.x), ~~(canvas.height/2 - camera.y));

        // 2. 【極致優化】一幀之內只呼叫一次 drawImage，瞬間繪製出包括漸變、邊界、營地和所有樹木的大底圖
        ctx.drawImage(bgCanvas, 0, 0);

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // 3. 繪製草叢（動態隱藏恐龍，最多只有 12 個，開銷極低）
        ctx.font = '50px Arial'; // 統一設置字型，避免在迴圈內重覆改寫
        dinos.forEach(dino => {
            if(dino.state === 'hidden') {
                ctx.fillText(dino.bushEmoji, dino.x, dino.y);
            }
        });

        // 4. 繪製跟隨在身後的恐龍隊伍（依據實際收服量調整）
        let caughtCount = 0;
        ctx.font = '35px Arial'; // 統一設置字型大小
        dinos.forEach(dino => {
            if(dino.state === 'caught') {
                caughtCount++;
                const historyIndex = caughtCount * 15; 
                const pos = player.history[historyIndex] || player.history[player.history.length-1];
                if(pos) {
                    ctx.fillText('🦖', ~~pos.x, ~~pos.y); // 坐標取整
                }
            }
        });

        // 5. 繪製主角 🌼
        ctx.font = `${player.size}px Arial`;
        ctx.fillText(player.emoji, ~~player.x, ~~player.y); // 坐標取整

        ctx.restore();
    }
</script>
</body>
</html>
